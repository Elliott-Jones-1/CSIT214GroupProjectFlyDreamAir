<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlyDreamAir Lounge</title>
    <link rel="stylesheet" href="https://lf6-cdn-tos.bytecdntp.com/cdn/expire-1-M/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #5856D6; /* 原型图高亮紫色 */
            --bg-light: #F2F2F7; /* 输入框及浅色背景 */
            --text-main: #1C1C1E;
            --text-secondary: #8E8E93;
            --success: #34C759;
            --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

        body { background-color: #f5f5f7; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

        /* 手机硬外壳框架 */
        .iphone {
            width: 375px;
            height: 780px;
            background: #fff;
            border: 12px solid #111;
            border-radius: 45px;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 顶部灵动岛外壳 */
        .notch {
            position: absolute;
            top: 0; left: 50%;
            transform: translateX(-50%);
            width: 120px; height: 30px;
            background: #111;
            border-bottom-left-radius: 18px;
            border-bottom-right-radius: 18px;
            z-index: 100;
        }

        /* 主体滚动内容区 */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 40px 20px 90px; /* 留出底部导航栏的空间，防止内容被遮挡 */
            background: #fff;
        }
        .content::-webkit-scrollbar { display: none; }

        /* 完美吸底的导航栏 */
        .nav-bar {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            height: 75px;
            background: #fff;
            border-top: 1px solid #E5E5EA;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: 12px;
            z-index: 99;
        }
        .nav-item {
            text-decoration: none;
            color: #A1A1AA;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 10px;
            font-weight: 600;
        }
        /* 动态高亮后台传来的当前页面 */
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 20px; margin-bottom: 5px; }

        /* 组件扩展插槽 */
        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    <div class="iphone">
        <div class="notch"></div>
        <div class="content">
            {% block content %}{% endblock %}
        </div>
        
        <nav class="nav-bar">
            <a href="/index" class="nav-item {% if active_page == 'home' %}active{% endif %}"><i class="fa-solid fa-house"></i><span>Home</span></a>
            <a href="/bookings" class="nav-item {% if active_page == 'bookings' %}active{% endif %}"><i class="fa-solid fa-calendar-check"></i><span>Bookings</span></a>
            <a href="/membership" class="nav-item {% if active_page == 'membership' %}active{% endif %}"><i class="fa-solid fa-crown"></i><span>Membership</span></a>
            <a href="#" class="nav-item"><i class="fa-solid fa-circle-user"></i><span>Profile</span></a>
        </nav>
    </div>
</body>
</html>
