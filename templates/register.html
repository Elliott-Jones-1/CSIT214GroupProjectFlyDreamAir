{% extends 'base.html' %}
{% block content %}
<div style="padding: 20px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #fff; min-height: 80vh;">
    <div style="text-align: center; margin-top: 10px;">
        <div style="background: #5856D6; color: white; width: 55px; height: 55px; line-height: 55px; border-radius: 14px; margin: 0 auto; font-size: 28px; font-weight: bold;">F</div>
        <h2 style="margin: 10px 0 2px 0; font-size: 20px;">FlyDreamAir</h2>
        <p style="color: #64748b; margin: 0; font-size: 12px;">Lounge Management</p>
    </div>

    <h2 style="margin: 25px 0 5px 0; font-size: 26px; font-weight: 700;">Create account</h2>
    <p style="color: #64748b; margin: 0 0 25px 0; font-size: 15px;">Join FlyDreamAir today</p>

    <form method="POST">
        <label style="display: block; margin-bottom: 6px; font-size: 14px;">Full name</label>
        <input type="text" style="width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 12px; margin-bottom: 15px; background: #f8fafc; box-sizing: border-box;">

        <label style="display: block; margin-bottom: 6px; font-size: 14px;">Email address</label>
        <input type="email" style="width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 12px; margin-bottom: 15px; background: #f8fafc; box-sizing: border-box;">

        <label style="display: block; margin-bottom: 6px; font-size: 14px;">Password</label>
        <input type="password" style="width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 12px; margin-bottom: 15px; background: #f8fafc; box-sizing: border-box;">

        <label style="display: block; margin-bottom: 6px; font-size: 14px;">Confirm password</label>
        <input type="password" style="width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 12px; margin-bottom: 25px; background: #f8fafc; box-sizing: border-box;">

        <button type="submit" style="width: 100%; padding: 16px; background: #5856D6; color: white; border: none; border-radius: 14px; font-weight: bold; font-size: 16px; cursor: pointer; margin-bottom: 15px;">
            Sign up
        </button>
    </form>

    <p style="text-align: center; font-size: 12px; color: #64748b; line-height: 1.5; padding: 0 20px;">
        By signing up, you agree to our <a href="#" style="color: #5856D6; text-decoration: none; font-weight: 600;">Terms of Service</a> and <a href="#" style="color: #5856D6; text-decoration: none; font-weight: 600;">Privacy Policy</a>
    </p>

    <div style="text-align: center; margin-top: 20px;">
        <p style="font-size: 14px; color: #475569;">Already have an account? <a href="{{ url_for('login') }}" style="color: #5856D6; text-decoration: none; font-weight: bold;">Sign in</a></p>
    </div>
</div>
{% endblock %}
