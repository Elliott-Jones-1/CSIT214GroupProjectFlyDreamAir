{% for l in lounges %}
<div style="border:1px solid #ddd; padding:15px; border-radius:15px; margin-bottom:15px;">
    <strong>{{ l.name }}</strong>
    <p>{{ l.airport }} | {{ l.price }}</p>
    <a href="{{ url_for('book', name=l.name, price=l.price) }}" 
       style="background:#5856D6; color:white; padding:10px 20px; border-radius:10px; text-decoration:none;">
       Book Now
    </a>
</div>
{% endfor %}
